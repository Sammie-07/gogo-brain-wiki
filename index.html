<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gogo's Brain — Live Graph</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#0c0b11;overflow:hidden;}
  #root{position:relative;width:100vw;height:100vh;background:#0c0b11;font-family:'Montserrat',system-ui,sans-serif;overflow:hidden;}
  #graph{position:absolute;inset:0;width:100%;height:100%;cursor:grab;}
  #graph:active{cursor:grabbing;}
  .title{position:absolute;top:18px;left:22px;z-index:10;pointer-events:none;}
  .title .t1{font-weight:700;font-size:13px;letter-spacing:1.4px;color:#e6c977;}
  .title .t2{font-size:10px;letter-spacing:0.5px;color:#6a6578;margin-top:3px;}
  .legend{position:absolute;top:16px;right:16px;z-index:10;display:flex;flex-direction:column;gap:7px;font-size:10.5px;letter-spacing:0.3px;
          background:rgba(22,20,30,0.4);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);padding:11px 14px;border-radius:11px;border:1px solid rgba(255,255,255,0.05);pointer-events:none;}
  .legend div{display:flex;align-items:center;gap:8px;}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .controls{position:absolute;bottom:18px;right:18px;z-index:10;display:flex;gap:7px;}
  .controls button{width:33px;height:33px;border-radius:9px;border:1px solid rgba(255,255,255,0.06);background:rgba(22,20,30,0.45);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);color:#9d98a8;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
  .controls button:hover{background:rgba(46,42,58,0.6);color:#efe9f8;}
  .hint{position:absolute;bottom:20px;left:22px;z-index:10;font-size:10px;color:#403d48;letter-spacing:0.4px;pointer-events:none;}
  #status{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;color:#9d98a8;font-size:13px;text-align:center;line-height:1.7;}
  #status .big{font-size:15px;color:#e6c977;font-weight:600;}
</style>
</head>
<body>
<div id="root">
  <canvas id="graph"></canvas>
  <div class="title">
    <div class="t1">Gogo's Brain</div>
    <div class="t2" id="subtitle">live graph</div>
  </div>
  <div class="legend" id="legend">
    <div style="color:#e6c05a"><i style="background:#e6c05a"></i><span style="color:#8a8694">Concepts</span></div>
    <div style="color:#a890dd"><i style="background:#a890dd"></i><span style="color:#8a8694">People &amp; Orgs</span></div>
    <div style="color:#6fa6e0"><i style="background:#6fa6e0"></i><span style="color:#8a8694">Sources</span></div>
    <div style="color:#615c70"><i style="background:#615c70"></i><span style="color:#8a8694">Unlinked</span></div>
  </div>
  <div id="status">Loading your vault&hellip;</div>
  <div class="controls">
    <button id="zin" title="Zoom in">+</button>
    <button id="zout" title="Zoom out">&minus;</button>
    <button id="zfit" title="Fit to screen">&#9678;</button>
  </div>
  <div class="hint">drag nodes &middot; drag background to pan &middot; scroll to zoom &middot; hover to focus</div>
</div>

<script>
(function(){
  // ============================================================
  const GH_OWNER  = "Sammie-07";
  const GH_REPO   = "gogo-brain-wiki";
  const GH_BRANCH = "main";
  // ============================================================

  const root=document.getElementById('root');
  const canvas=document.getElementById('graph');
  const ctx=canvas.getContext('2d');
  const statusEl=document.getElementById('status');
  const subtitle=document.getElementById('subtitle');

  let W,H,DPR;
  function resize(){
    DPR=window.devicePixelRatio||1;
    const r=root.getBoundingClientRect();
    W=r.width;H=r.height;
    canvas.width=W*DPR;canvas.height=H*DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  resize(); window.addEventListener('resize',()=>{resize();});

  const GROUP_COLORS={concept:'#e6c05a',entity:'#a890dd',source:'#6fa6e0',index:'#f0d27a',other:'#615c70'};
  const NODE_HOVER='#fbf7ff', LABEL_COLOR='#9a96a4', LABEL_HI='#f2eefa';
  let nodes=[], links=[], adj={};
  let alpha=0, fitZoom=1;
  const cam={x:0,y:0,z:1};

  function noteKey(p){ return p.split('/').pop().replace(/\.md$/i,'').trim(); }
  function groupOf(path){
    const p=(path||'').toLowerCase();
    if(/(^|\/)concepts\//.test(p)) return 'concept';
    if(/(^|\/)entities\//.test(p)) return 'entity';
    if(/(^|\/)sources\//.test(p))  return 'source';
    if(/(^|\/)index\.md$/.test(p)) return 'index';
    return 'other';
  }
  function targetName(raw){
    const base=raw.split('|')[0].split('/').pop();
    const hi=base.indexOf('#',1);
    return (hi>0?base.slice(0,hi):base).trim();
  }

  function buildGraph(files){
    const map=new Map();
    const rnd=()=>(Math.random()-0.5)*1600;
    const mk=(k,label,g)=>({id:k,label:label,deg:0,group:g,x:rnd(),y:rnd(),vx:0,vy:0});
    files.forEach(f=>{
      const t=noteKey(f.path), k=t.toLowerCase(), g=groupOf(f.path);
      if(!map.has(k)) map.set(k,mk(k,t,g)); else map.get(k).group=g;
    });
    const edges=[], re=/\[\[([^\]]+?)\]\]/g;
    files.forEach(f=>{
      const from=noteKey(f.path).toLowerCase(); let m;
      while((m=re.exec(f.text))){
        const label=targetName(m[1]);
        const to=label.toLowerCase();
        if(to===from||!to) continue;
        if(!map.has(to)) map.set(to,mk(to,label,'other'));
        edges.push([from,to]);
      }
    });
    const seen=new Set(), uniq=[];
    edges.forEach(([a,b])=>{ const key=a<b?a+'|'+b:b+'|'+a; if(!seen.has(key)){seen.add(key);uniq.push([a,b]);map.get(a).deg++;map.get(b).deg++;} });
    const ns=[...map.values()];
    const lk=uniq.map(([a,b])=>({a:map.get(a),b:map.get(b)}));
    ns.forEach(n=>{ n.r=2.5+Math.min(n.deg,16)*0.95; });
    [...ns].sort((a,b)=>b.deg-a.deg).slice(0,12).forEach(n=>n.hub=true);
    adj={}; ns.forEach(n=>adj[n.id]=new Set());
    lk.forEach(l=>{adj[l.a.id].add(l.b.id);adj[l.b.id].add(l.a.id);});
    return {nodes:ns,links:lk};
  }

  async function loadVault(){
    try{
      let branch=GH_BRANCH;
      if(!branch){
        const rr=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}`);
        if(!rr.ok) throw new Error('repo not found ('+rr.status+')');
        branch=(await rr.json()).default_branch;
      }
      const tr=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/git/trees/${branch}?recursive=1`);
      if(!tr.ok) throw new Error(tr.status===403?'GitHub API rate limit — wait a few minutes and reload':'tree fetch failed ('+tr.status+')');
      const tree=(await tr.json()).tree||[];
      const mdPaths=tree.filter(t=>t.type==='blob'&&/\.md$/i.test(t.path)).map(t=>t.path);
      if(!mdPaths.length) throw new Error('no markdown files found');
      const files=[]; const CHUNK=25;
      for(let i=0;i<mdPaths.length;i+=CHUNK){
        const batch=mdPaths.slice(i,i+CHUNK);
        const texts=await Promise.all(batch.map(p=>
          fetch(`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${branch}/${encodeURI(p)}`)
            .then(r=>r.ok?r.text():'').catch(()=>'')
        ));
        batch.forEach((p,j)=>files.push({path:p,text:texts[j]}));
        statusEl.innerHTML='Reading notes&hellip; '+Math.min(i+CHUNK,mdPaths.length)+'/'+mdPaths.length;
      }
      const g=buildGraph(files);
      nodes=g.nodes; links=g.links;
      statusEl.innerHTML='Arranging '+nodes.length+' notes&hellip;';
      alpha=1;
      for(let i=0;i<700;i++) physics();   // settle fully, headless
      fitView();
      alpha=0;                            // come to rest — no idle motion
      statusEl.style.display='none';
      subtitle.textContent=nodes.length+' notes · '+links.length+' links · live from GitHub';
    }catch(err){
      statusEl.innerHTML='<span class="big">Couldn’t load the vault.</span><br>'+err.message;
    }
  }

  const w2s=(x,y)=>({x:(x-cam.x)*cam.z+W/2,y:(y-cam.y)*cam.z+H/2});
  const s2w=(x,y)=>({x:(x-W/2)/cam.z+cam.x,y:(y-H/2)/cam.z+cam.y});
  function fitView(pad){
    pad=pad||80; if(!nodes.length) return;
    let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
    for(const n of nodes){if(n.x<minx)minx=n.x;if(n.x>maxx)maxx=n.x;if(n.y<miny)miny=n.y;if(n.y>maxy)maxy=n.y;}
    const w=(maxx-minx)||1,h=(maxy-miny)||1;
    cam.x=(minx+maxx)/2; cam.y=(miny+maxy)/2;
    cam.z=Math.max(0.05,Math.min(2.5,Math.min((W-2*pad)/w,(H-2*pad)/h)));
    fitZoom=cam.z;
  }

  let hover=null,dragNode=null,panning=false,lastX=0,lastY=0;
  function nodeAt(sx,sy){ const wp=s2w(sx,sy); let best=null,bd=1e9; for(const n of nodes){const d=Math.hypot(n.x-wp.x,n.y-wp.y),hr=(n.r+6)/cam.z; if(d<hr&&d<bd){bd=d;best=n;}} return best; }
  canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;lastX=sx;lastY=sy;const n=nodeAt(sx,sy);if(n){dragNode=n;n.fixed=true;alpha=Math.max(alpha,0.5);}else panning=true;});
  window.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;if(dragNode){const wp=s2w(sx,sy);dragNode.x=wp.x;dragNode.y=wp.y;dragNode.vx=0;dragNode.vy=0;alpha=Math.max(alpha,0.35);}else if(panning){cam.x-=(sx-lastX)/cam.z;cam.y-=(sy-lastY)/cam.z;}else{hover=nodeAt(sx,sy);canvas.style.cursor=hover?'pointer':'grab';}lastX=sx;lastY=sy;});
  window.addEventListener('mouseup',()=>{if(dragNode){dragNode.fixed=false;dragNode=null;}panning=false;});
  canvas.addEventListener('wheel',e=>{e.preventDefault();const r=canvas.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top,b=s2w(sx,sy),f=e.deltaY<0?1.12:0.89;cam.z=Math.max(0.04,Math.min(7,cam.z*f));const a=s2w(sx,sy);cam.x+=b.x-a.x;cam.y+=b.y-a.y;},{passive:false});
  document.getElementById('zin').onclick=()=>cam.z=Math.min(7,cam.z*1.25);
  document.getElementById('zout').onclick=()=>cam.z=Math.max(0.04,cam.z*0.8);
  document.getElementById('zfit').onclick=()=>fitView();

  // ---------- FORCE LAYOUT — settles and rests (no idle animation) ----------
  function physics(){
    const n=nodes.length; if(!n||alpha<0.004) return;
    const REP=2800, GRAV=0.0009, SPRING=0.012, REST=95, DAMP=0.9, CAP=55;
    for(let i=0;i<n;i++){const a=nodes[i];for(let j=i+1;j<n;j++){const b=nodes[j];let dx=b.x-a.x,dy=b.y-a.y,d2=dx*dx+dy*dy;if(d2<1)d2=1;const d=Math.sqrt(d2),force=REP/d2,fx=dx/d*force,fy=dy/d*force;if(!a.fixed){a.vx-=fx;a.vy-=fy;}if(!b.fixed){b.vx+=fx;b.vy+=fy;}}}
    for(const l of links){let dx=l.b.x-l.a.x,dy=l.b.y-l.a.y;const d=Math.hypot(dx,dy)||1,f=(d-REST)*SPRING,fx=dx/d*f,fy=dy/d*f;if(!l.a.fixed){l.a.vx+=fx;l.a.vy+=fy;}if(!l.b.fixed){l.b.vx-=fx;l.b.vy-=fy;}}
    for(const nd of nodes){if(nd.fixed)continue;nd.vx+=-nd.x*GRAV;nd.vy+=-nd.y*GRAV;let sp=Math.hypot(nd.vx,nd.vy);if(sp>CAP){nd.vx=nd.vx/sp*CAP;nd.vy=nd.vy/sp*CAP;}nd.x+=nd.vx*alpha;nd.y+=nd.vy*alpha;nd.vx*=DAMP;nd.vy*=DAMP;}
  }

  // ---------- RENDER (clean) ----------
  function draw(){
    const g=ctx.createRadialGradient(W/2,H*0.42,0,W/2,H*0.42,Math.max(W,H)*0.85);
    g.addColorStop(0,'#15131d'); g.addColorStop(0.6,'#0f0e16'); g.addColorStop(1,'#0a090e');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    const focus=hover, near=focus?adj[focus.id]:null;
    const dimLink=l=>focus?((l.a===focus||l.b===focus)?1:0.04):1;

    ctx.lineWidth=Math.max(0.4,cam.z*0.5);
    for(const l of links){const a=w2s(l.a.x,l.a.y),b=w2s(l.b.x,l.b.y),al=dimLink(l);ctx.strokeStyle=(focus&&al===1)?'rgba(190,178,228,0.65)':'rgba(120,118,144,'+(0.16*al)+')';ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}

    for(const nd of nodes){const s=w2s(nd.x,nd.y),r=Math.max(1.6,nd.r*cam.z),a=focus?((nd===focus||near.has(nd.id))?1:0.13):1,col=GROUP_COLORS[nd.group]||GROUP_COLORS.other;ctx.beginPath();ctx.arc(s.x,s.y,r,0,6.283);ctx.fillStyle=nd===hover?NODE_HOVER:col;ctx.globalAlpha=a*(nd.group==='other'?0.7:1);ctx.fill();ctx.globalAlpha=1;}

    if(hover){const s=w2s(hover.x,hover.y),r=Math.max(2,hover.r*cam.z);ctx.strokeStyle='rgba(240,236,248,0.45)';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(s.x,s.y,r+4,0,6.283);ctx.stroke();}

    // labels — hidden at overview, reveal as you zoom in; hover always
    ctx.textAlign='center';ctx.textBaseline='top';
    const zin=cam.z/fitZoom, showAuto=zin>1.35;
    const cand=[];
    for(const nd of nodes){
      if(!nd.label)continue;
      const screenR=nd.r*cam.z, related=focus&&(nd===focus||(near&&near.has(nd.id)));
      if(focus){ if(!related) continue; }
      else { if(!showAuto) continue; if(!(nd.hub||screenR>6.5)) continue; }
      cand.push({nd,pri:nd===hover?1e9:(related?1e8+nd.deg:(nd.hub?1e6+nd.deg:screenR)),screenR,related});
    }
    cand.sort((a,b)=>b.pri-a.pri);
    const placed=[];
    for(const c of cand){
      const nd=c.nd,s=w2s(nd.x,nd.y),r=Math.max(1.6,nd.r*cam.z),fs=nd.hub?10:(c.screenR>12?9.5:8.5);
      ctx.font=(nd.hub?'600 ':'500 ')+fs+'px Montserrat, sans-serif';
      const tw=ctx.measureText(nd.label).width,x=s.x,y=s.y+r+5,box={x0:x-tw/2-3,y0:y-1,x1:x+tw/2+3,y1:y+fs+2};
      let hit=false; if(nd!==hover){ for(const p of placed){ if(box.x0<p.x1&&box.x1>p.x0&&box.y0<p.y1&&box.y1>p.y0){hit=true;break;} } }
      if(hit) continue; placed.push(box);
      ctx.lineWidth=3; ctx.lineJoin='round'; ctx.strokeStyle='rgba(10,9,14,0.92)'; ctx.strokeText(nd.label,x,y);
      ctx.fillStyle=(nd===hover||c.related)?LABEL_HI:LABEL_COLOR; ctx.fillText(nd.label,x,y);
    }
  }

  function loop(){
    if(alpha>0.004){ physics(); alpha*=0.985; }   // animate only while settling / after a drag
    draw();
    requestAnimationFrame(loop);
  }
  loop();
  loadVault();
})();
</script>
</body>
</html>
