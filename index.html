<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gogo's Brain — Live Graph</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#0d0d0f;overflow:hidden;}
  #root{position:relative;width:100vw;height:100vh;background:#0d0d0f;font-family:'Montserrat',system-ui,sans-serif;overflow:hidden;}
  #graph{position:absolute;inset:0;width:100%;height:100%;cursor:grab;}
  #graph:active{cursor:grabbing;}
  .title{position:absolute;top:18px;left:22px;z-index:10;pointer-events:none;}
  .title .t1{font-weight:700;font-size:13px;letter-spacing:1px;color:#b9a96b;}
  .title .t2{font-size:10px;letter-spacing:0.5px;color:#5a5660;margin-top:3px;}
  .legend{position:absolute;top:18px;right:18px;z-index:10;display:flex;flex-direction:column;gap:5px;font-size:10px;letter-spacing:0.3px;color:#7a7684;pointer-events:none;}
  .legend div{display:flex;align-items:center;gap:7px;}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .controls{position:absolute;bottom:18px;right:18px;z-index:10;display:flex;gap:6px;}
  .controls button{width:32px;height:32px;border-radius:7px;border:1px solid #2a2a2f;background:rgba(28,28,32,0.9);color:#9a96a0;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .controls button:hover{background:#2a2a30;color:#e0dce6;}
  .hint{position:absolute;bottom:18px;left:22px;z-index:10;font-size:10px;color:#4a464f;letter-spacing:0.4px;pointer-events:none;}
  #status{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;color:#9a96a0;font-size:13px;text-align:center;line-height:1.7;}
  #status .big{font-size:15px;color:#b9a96b;font-weight:600;}
  #status a{color:#9b8cc4;}
</style>
</head>
<body>
<div id="root">
  <canvas id="graph"></canvas>
  <div class="title">
    <div class="t1">Gogo's Brain</div>
    <div class="t2" id="subtitle">live graph</div>
  </div>
  <div class="legend" id="legend">
    <div><i style="background:#c9a84a"></i>Concepts</div>
    <div><i style="background:#9b8cc4"></i>People &amp; Orgs</div>
    <div><i style="background:#5f88b5"></i>Sources</div>
    <div><i style="background:#6b6675"></i>Unlinked</div>
  </div>
  <div id="status">Loading your vault&hellip;</div>
  <div class="controls">
    <button id="zin" title="Zoom in">+</button>
    <button id="zout" title="Zoom out">&minus;</button>
    <button id="zfit" title="Reset view">&#9678;</button>
  </div>
  <div class="hint">drag nodes &middot; drag background to pan &middot; scroll to zoom &middot; hover to focus</div>
</div>

<script>
(function(){
  // ============================================================
  //  CONFIG — points at the PUBLIC wiki mirror on GitHub.
  // ============================================================
  const GH_OWNER  = "Sammie-07";          // public wiki mirror owner
  const GH_REPO   = "gogo-brain-wiki";    // public wiki mirror repo
  const GH_BRANCH = "main";               // default branch of the mirror
  // ============================================================

  const root=document.getElementById('root');
  const canvas=document.getElementById('graph');
  const ctx=canvas.getContext('2d');
  const statusEl=document.getElementById('status');
  const subtitle=document.getElementById('subtitle');

  let W,H,DPR;
  function resize(){
    DPR=window.devicePixelRatio||1;
    const r=root.getBoundingClientRect();
    W=r.width;H=r.height;
    canvas.width=W*DPR;canvas.height=H*DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  resize(); window.addEventListener('resize',resize);

  // Group colours (Obsidian-style)
  const GROUP_COLORS={concept:'#c9a84a',entity:'#9b8cc4',source:'#5f88b5',index:'#d9c98a',other:'#6b6675'};
  const NODE_HOVER='#efe9f8', LABEL_COLOR='#8a8694', LABEL_HI='#e6e0f0';
  let nodes=[], links=[], adj={};
  const cam={x:0,y:0,z:1};

  // ---------- helpers ----------
  function noteKey(p){ return p.split('/').pop().replace(/\.md$/i,'').trim(); }
  function groupOf(path){
    const p=(path||'').toLowerCase();
    if(/(^|\/)concepts\//.test(p)) return 'concept';
    if(/(^|\/)entities\//.test(p)) return 'entity';
    if(/(^|\/)sources\//.test(p))  return 'source';
    if(/(^|\/)index\.md$/.test(p)) return 'index';
    return 'other';
  }
  // Resolve a wikilink target to a clean note name.
  // Heading anchors (Note#Heading) are stripped, but a leading '#'
  // that is part of the note name (e.g. "#teamgogo") is preserved.
  function targetName(raw){
    const noAlias=raw.split('|')[0];
    const base=noAlias.split('/').pop();
    const hi=base.indexOf('#',1);          // search from index 1 so leading '#' stays
    return (hi>0?base.slice(0,hi):base).trim();
  }

  // ---------- WIKILINK PARSER ----------
  function buildGraph(files){
    const map=new Map();
    const rnd=()=>(Math.random()-0.5)*600;
    files.forEach(f=>{
      const t=noteKey(f.path), k=t.toLowerCase(), g=groupOf(f.path);
      if(!map.has(k)) map.set(k,{id:k,label:t,deg:0,group:g,x:rnd(),y:rnd(),vx:0,vy:0});
      else map.get(k).group=g;
    });
    const edges=[], re=/\[\[([^\]]+?)\]\]/g;
    files.forEach(f=>{
      const from=noteKey(f.path).toLowerCase(); let m;
      while((m=re.exec(f.text))){
        const label=targetName(m[1]);
        const to=label.toLowerCase();
        if(to===from||!to) continue;
        if(!map.has(to)) map.set(to,{id:to,label:label,deg:0,group:'other',x:rnd(),y:rnd(),vx:0,vy:0});
        edges.push([from,to]);
      }
    });
    const seen=new Set(), uniq=[];
    edges.forEach(([a,b])=>{ const key=a<b?a+'|'+b:b+'|'+a; if(!seen.has(key)){seen.add(key);uniq.push([a,b]);map.get(a).deg++;map.get(b).deg++;} });
    const ns=[...map.values()];
    const lk=uniq.map(([a,b])=>({a:map.get(a),b:map.get(b)}));
    ns.forEach(n=>{ n.r=3+Math.min(n.deg,12)*1.0; });
    adj={}; ns.forEach(n=>adj[n.id]=new Set());
    lk.forEach(l=>{adj[l.a.id].add(l.b.id);adj[l.b.id].add(l.a.id);});
    return {nodes:ns,links:lk};
  }

  // ---------- FETCH VAULT FROM GITHUB ----------
  async function loadVault(){
    if(GH_OWNER.startsWith("YOUR_")){
      statusEl.innerHTML='<span class="big">Almost there.</span><br>Open this file in a text editor and set<br>GH_OWNER and GH_REPO at the top to your vault repo.';
      return;
    }
    try{
      let branch=GH_BRANCH;
      if(!branch){
        const rr=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}`);
        if(!rr.ok) throw new Error('repo not found ('+rr.status+')');
        branch=(await rr.json()).default_branch;
      }
      const tr=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/git/trees/${branch}?recursive=1`);
      if(!tr.ok) throw new Error('tree fetch failed ('+tr.status+')');
      const tree=(await tr.json()).tree||[];
      const mdPaths=tree.filter(t=>t.type==='blob'&&/\.md$/i.test(t.path)).map(t=>t.path);
      if(!mdPaths.length) throw new Error('no markdown files found');
      statusEl.innerHTML='Reading '+mdPaths.length+' notes&hellip;';
      const files=[];
      const CHUNK=25;
      for(let i=0;i<mdPaths.length;i+=CHUNK){
        const batch=mdPaths.slice(i,i+CHUNK);
        const texts=await Promise.all(batch.map(p=>
          fetch(`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${branch}/${encodeURI(p)}`)
            .then(r=>r.ok?r.text():'').catch(()=>'')
        ));
        batch.forEach((p,j)=>files.push({path:p,text:texts[j]}));
        statusEl.innerHTML='Reading notes&hellip; '+Math.min(i+CHUNK,mdPaths.length)+'/'+mdPaths.length;
      }
      const g=buildGraph(files);
      nodes=g.nodes; links=g.links;
      statusEl.style.display='none';
      subtitle.textContent=nodes.length+' notes · '+links.length+' links · live from GitHub';
    }catch(err){
      statusEl.innerHTML='<span class="big">Couldn’t load the vault.</span><br>'+err.message+'<br><br>Check the repo is <b>public</b> and GH_OWNER / GH_REPO are correct.';
    }
  }

  // ---------- CAMERA ----------
  const w2s=(x,y)=>({x:(x-cam.x)*cam.z+W/2,y:(y-cam.y)*cam.z+H/2});
  const s2w=(x,y)=>({x:(x-W/2)/cam.z+cam.x,y:(y-H/2)/cam.z+cam.y});

  // ---------- INTERACTION ----------
  let hover=null,dragNode=null,panning=false,lastX=0,lastY=0;
  function nodeAt(sx,sy){ const w=s2w(sx,sy); let best=null,bd=1e9; for(const n of nodes){const d=Math.hypot(n.x-w.x,n.y-w.y),hr=(n.r+6)/cam.z; if(d<hr&&d<bd){bd=d;best=n;}} return best; }
  canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;lastX=sx;lastY=sy;const n=nodeAt(sx,sy);if(n){dragNode=n;n.fixed=true;}else panning=true;});
  window.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;if(dragNode){const w=s2w(sx,sy);dragNode.x=w.x;dragNode.y=w.y;dragNode.vx=0;dragNode.vy=0;}else if(panning){cam.x-=(sx-lastX)/cam.z;cam.y-=(sy-lastY)/cam.z;}else{hover=nodeAt(sx,sy);canvas.style.cursor=hover?'pointer':'grab';}lastX=sx;lastY=sy;});
  window.addEventListener('mouseup',()=>{if(dragNode){dragNode.fixed=false;dragNode=null;}panning=false;});
  canvas.addEventListener('wheel',e=>{e.preventDefault();const r=canvas.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top,b=s2w(sx,sy),f=e.deltaY<0?1.12:0.89;cam.z=Math.max(0.15,Math.min(5,cam.z*f));const a=s2w(sx,sy);cam.x+=b.x-a.x;cam.y+=b.y-a.y;},{passive:false});
  document.getElementById('zin').onclick=()=>cam.z=Math.min(5,cam.z*1.2);
  document.getElementById('zout').onclick=()=>cam.z=Math.max(0.15,cam.z*0.83);
  document.getElementById('zfit').onclick=()=>{cam.x=0;cam.y=0;cam.z=1;};

  // ---------- FORCE LAYOUT ----------
  function physics(){
    const n=nodes.length; if(!n) return;
    for(let i=0;i<n;i++){const a=nodes[i];for(let j=i+1;j<n;j++){const b=nodes[j];let dx=b.x-a.x,dy=b.y-a.y,d2=dx*dx+dy*dy;if(d2<1)d2=1;const d=Math.sqrt(d2),force=1900/d2,fx=dx/d*force,fy=dy/d*force;if(!a.fixed){a.vx-=fx;a.vy-=fy;}if(!b.fixed){b.vx+=fx;b.vy+=fy;}}}
    for(const l of links){let dx=l.b.x-l.a.x,dy=l.b.y-l.a.y;const d=Math.hypot(dx,dy)||1,f=(d-90)*0.014,fx=dx/d*f,fy=dy/d*f;if(!l.a.fixed){l.a.vx+=fx;l.a.vy+=fy;}if(!l.b.fixed){l.b.vx-=fx;l.b.vy-=fy;}}
    for(const nd of nodes){if(nd.fixed)continue;nd.vx+=-nd.x*0.0012;nd.vy+=-nd.y*0.0012;nd.x+=nd.vx;nd.y+=nd.vy;nd.vx*=0.86;nd.vy*=0.86;}
  }

  // ---------- RENDER ----------
  function draw(){
    ctx.clearRect(0,0,W,H);
    const focus=hover, near=focus?adj[focus.id]:null;
    const dim=nd=>focus?(nd===focus||near.has(nd.id)?1:0.12):1;
    const dimLink=l=>focus?((l.a===focus||l.b===focus)?1:0.06):1;
    ctx.lineWidth=Math.max(0.5,cam.z*0.6);
    for(const l of links){const a=w2s(l.a.x,l.a.y),b=w2s(l.b.x,l.b.y),al=dimLink(l);ctx.strokeStyle=(focus&&al===1)?'rgba(170,160,210,0.6)':'rgba(120,116,140,'+(0.3*al)+')';ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
    for(const nd of nodes){const s=w2s(nd.x,nd.y),r=Math.max(1.5,nd.r*cam.z),a=dim(nd);const col=GROUP_COLORS[nd.group]||GROUP_COLORS.other;if(focus&&(nd===focus||near.has(nd.id))){ctx.beginPath();ctx.arc(s.x,s.y,r+5,0,Math.PI*2);ctx.fillStyle='rgba(155,140,196,0.18)';ctx.fill();}ctx.beginPath();ctx.arc(s.x,s.y,r,0,Math.PI*2);ctx.fillStyle=nd===hover?NODE_HOVER:col;ctx.globalAlpha=a;ctx.fill();ctx.globalAlpha=1;}
    ctx.textAlign='center';ctx.textBaseline='top';
    for(const nd of nodes){if(!nd.label)continue;const s=w2s(nd.x,nd.y),r=Math.max(1.5,nd.r*cam.z),a=dim(nd);const big=nd.deg>=4;const show=big||cam.z>1.05||nd===hover||(focus&&near&&near.has(nd.id));if(!show)continue;const fs=big?11:9.5;ctx.font='500 '+fs+'px Montserrat, sans-serif';ctx.fillStyle=(nd===hover||(focus&&near&&near.has(nd.id)))?LABEL_HI:LABEL_COLOR;ctx.globalAlpha=focus?(a===1?1:0.15):0.85;ctx.fillText(nd.label,s.x,s.y+r+3);ctx.globalAlpha=1;}
  }

  function loop(){ physics(); draw(); requestAnimationFrame(loop); }
  loop();
  loadVault();
})();
</script>
</body>
</html>
